<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src https://api.open-meteo.com https://geocoding-api.open-meteo.com https://nominatim.openstreetmap.org; img-src 'self' data:;">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drizzl Weather</title>
<link rel="manifest" href="manifest.json">
<style>
@font-face {
  font-family: 'Bricolage Grotesque';
  font-style: normal; font-weight: 400;
  font-display: swap;
  src: url('fonts/bricolage-grotesque-latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Bricolage Grotesque';
  font-style: normal; font-weight: 600;
  font-display: swap;
  src: url('fonts/bricolage-grotesque-latin-600-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Bricolage Grotesque';
  font-style: normal; font-weight: 700;
  font-display: swap;
  src: url('fonts/bricolage-grotesque-latin-700-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'DM Sans';
  font-style: normal; font-weight: 300;
  font-display: swap;
  src: url('fonts/dm-sans-latin-300-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'DM Sans';
  font-style: normal; font-weight: 400;
  font-display: swap;
  src: url('fonts/dm-sans-latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'DM Sans';
  font-style: normal; font-weight: 500;
  font-display: swap;
  src: url('fonts/dm-sans-latin-500-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'DM Sans';
  font-style: normal; font-weight: 600;
  font-display: swap;
  src: url('fonts/dm-sans-latin-600-normal.woff2') format('woff2');
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: rgba(0,0,0,0.4);
  --bg-card-hover: rgba(0,0,0,0.5);
  --text-primary: #f0f0f0;
  --text-secondary: rgba(240,240,240,0.75);
  --text-dim: rgba(240,240,240,0.5);
  --accent: #60a5fa;
  --accent-warm: #fbbf24;
  --accent-cool: #818cf8;
  --radius: 16px;
  --radius-sm: 10px;
  --font-display: 'Bricolage Grotesque', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Atmospheric background ── */
#atmosphere {
  position: fixed; inset: 0; z-index: 0;
  transition: background 1.5s ease;
}
.atmos-day    { background: linear-gradient(170deg, #2563eb 0%, #60a5fa 40%, #93c5fd 100%); }
.atmos-day .card { --bg-card: rgba(0,0,0,0.3); }
.atmos-day .current-details span { background: rgba(0,0,0,0.3); }
.atmos-day .hour-chip { background: rgba(0,0,0,0.2); }
.atmos-day .hour-chip.now { background: rgba(0,0,0,0.35); }
.atmos-night  { background: linear-gradient(170deg, #0f172a 0%, #1e1b4b 50%, #1a1a2e 100%); }
.atmos-dawn   { background: linear-gradient(170deg, #1e3a5f 0%, #d97706 40%, #fbbf24 100%); }
.atmos-dawn .card { --bg-card: rgba(0,0,0,0.3); }
.atmos-dawn .current-details span { background: rgba(0,0,0,0.3); }
.atmos-dusk   { background: linear-gradient(170deg, #4c1d95 0%, #dc2626 35%, #f59e0b 100%); }
.atmos-overcast { background: linear-gradient(170deg, #475569 0%, #64748b 50%, #94a3b8 100%); }
.atmos-overcast .card { --bg-card: rgba(0,0,0,0.45); }
.atmos-rain   { background: linear-gradient(170deg, #1e293b 0%, #334155 50%, #475569 100%); }
.atmos-snow   { background: linear-gradient(170deg, #cbd5e1 0%, #e2e8f0 50%, #f1f5f9 100%); }
.atmos-snow .card { --bg-card: rgba(0,0,0,0.3); }
.atmos-snow { --text-primary: #1e293b; --text-secondary: rgba(30,41,59,0.65); --text-dim: rgba(30,41,59,0.4); }

/* ── App shell ── */
#app {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: calc(var(--safe-top) + 12px) 16px calc(var(--safe-bottom) + 24px);
  min-height: 100vh; min-height: 100dvh;
}

/* ── Header / Location bar ── */
.header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 20px;
}
.header h1 {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 600;
  flex-shrink: 0; opacity: 0.9;
  letter-spacing: -0.02em;
}
.header-spacer { flex: 1; }
.icon-btn {
  background: var(--bg-card); border: none; color: var(--text-primary);
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.2rem;
  transition: background 0.2s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--bg-card-hover); }
.icon-btn.active { background: rgba(96,165,250,0.3); }

/* ── Location search overlay ── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: none; flex-direction: column;
  padding: calc(var(--safe-top) + 16px) 16px 16px;
}
.overlay.open { display: flex; }
.search-box {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.search-box input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.15); color: var(--text-primary);
  font-family: var(--font-body); font-size: 1rem;
  outline: none;
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box input:focus { border-color: var(--accent); }
.search-results, .fav-list {
  list-style: none;
  overflow-y: auto;
}
.overlay-scroll {
  flex: 1; overflow-y: auto;
}
.search-results li, .fav-list li {
  padding: 8px 16px; border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background 0.15s;
}
.search-results li:hover, .fav-list li:hover { background: rgba(255,255,255,0.15); }
.fav-list li .fav-name { flex: 1; }
.fav-list li .fav-remove {
  opacity: 0.4; cursor: pointer; font-size: 1.1rem; padding: 4px;
}
.fav-list li .fav-remove:hover { opacity: 1; }
.section-label {
  font-size: 1.2rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim);
  padding: 8px 0 4px;
}

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.card-title {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-secondary);
  margin-bottom: 14px;
}

/* ── Current conditions ── */
.current-location {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 700;
  margin-bottom: 2px; letter-spacing: -0.02em;
}
.current-region {
  font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px;
}
.current-localtime {
  font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px;
  font-variant-numeric: tabular-nums;
}
.current-main {
  display: flex; align-items: flex-start; gap: 16px;
  margin-bottom: 16px;
}
.current-temp {
  font-family: var(--font-display);
  font-size: 4.5rem; font-weight: 700;
  line-height: 1; letter-spacing: -0.04em;
}
.current-temp sup { font-size: 2rem; font-weight: 400; }
.current-icon { font-size: 4rem; line-height: 1; margin-top: 4px; }
.current-details {
  display: flex; flex-wrap: wrap; gap: 8px;
  font-size: 1rem; color: var(--text-secondary);
}
.current-details span {
  background: rgba(255,255,255,0.15);
  padding: 6px 12px; border-radius: 20px;
}
.current-desc {
  font-size: 1.15rem; margin-bottom: 12px; font-weight: 400;
}

/* ── Hourly scroll ── */
.hourly-scroll {
  display: flex; gap: 4px;
  overflow-x: auto; margin: 0 -20px; padding: 0 20px 8px;
  scrollbar-width: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.hour-chip {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  font-size: 0.95rem; min-width: 72px;
  background: rgba(255,255,255,0.12);
  transition: background 0.15s;
}
.hour-chip.now { background: rgba(96,165,250,0.3); }
.hour-chip .h-time { color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; }
.hour-chip .h-icon { font-size: 1.5rem; }
.hour-chip .h-temp { font-weight: 600; font-size: 1.05rem; }
.hour-chip .h-precip { font-size: 0.85rem; color: #b3d4fc; }
.hour-chip .h-wind { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }

/* ── Daily forecast ── */
.daily-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.25);
}
.daily-row:last-child { border-bottom: none; }
.daily-day { width: 48px; font-size: 1rem; font-weight: 600; }
.daily-day-date { font-size: 0.72rem; color: var(--text-dim); font-weight: 400; }
.card-title-date { font-size: 0.78rem; color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px; }
.daily-icon { font-size: 1.5rem; width: 36px; text-align: center; }
.daily-precip { font-size: 0.9rem; color: #b3d4fc; width: 40px; text-align: right; }
.daily-wind { font-size: 0.85rem; color: var(--text-primary); width: 60px; text-align: right; white-space: nowrap; }
.daily-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
.daily-lo { font-size: 0.95rem; color: var(--text-secondary); width: 32px; text-align: right; }
.daily-hi { font-size: 0.95rem; font-weight: 700; width: 32px; }
.daily-bar {
  flex: 1; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.2);
  position: relative; overflow: hidden;
}
.daily-bar-fill {
  position: absolute; top: 0; height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-warm));
}

/* ── Daylight graph ── */
.daylight-graph {
  position: relative;
  width: 100%;
}
.daylight-graph svg {
  width: 100%; height: auto;
  display: block;
}
.daylight-summary {
  display: flex; justify-content: center; gap: 24px;
  padding-top: 14px; margin-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 1.1rem; color: var(--text-secondary);
}
.daylight-summary span { font-weight: 500; color: var(--text-primary); }
.moon-row {
  display: flex; align-items: center; gap: 14px;
  padding-top: 14px; margin-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.moon-disc {
  width: 40px; height: 40px; border-radius: 50%;
  position: relative; overflow: hidden;
  background: #e8e8d0;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(255,255,200,0.15);
}
.moon-shadow {
  position: absolute; top: 0; height: 100%;
  background: #1a1a2e;
  transition: all 0.3s;
}
.moon-info { flex: 1; }
.moon-name { font-size: 1.2rem; font-weight: 500; }
.moon-illum { font-size: 1.05rem; color: var(--text-secondary); }
.moon-graph {
  position: relative;
  width: 100%;
}
.moon-graph svg {
  width: 100%; height: auto;
  display: block;
}
.moon-summary {
  display: flex; justify-content: center; gap: 24px;
  padding-top: 14px; margin-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 1.1rem; color: var(--text-secondary);
}
.moon-summary span { font-weight: 500; color: var(--text-primary); }

/* ── Wind details ── */
.wind-details {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.detail-item { text-align: center; }
.detail-value { font-size: 1.3rem; font-weight: 600; font-family: var(--font-display); }
.detail-label { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }
.detail-icon { font-size: 1.4rem; margin-bottom: 4px; }

/* ── Loading / Error ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-secondary); font-size: 0.9rem; }
.error-msg {
  text-align: center; padding: 40px 20px;
  color: var(--text-secondary);
}
.error-msg button {
  margin-top: 12px; padding: 10px 24px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-body); font-weight: 500;
}

/* ── Transitions ── */
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ── Updated timestamp ── */
.updated {
  text-align: center; font-size: 0.75rem;
  color: var(--text-dim); padding: 16px 0 0;
}
</style>
</head>
<body>

<div id="atmosphere"></div>

<div id="app">
  <header class="header">
    <h1>☂ Drizzl</h1>
    <div class="header-spacer"></div>
    <button class="icon-btn" id="btnGeo" title="Use my location">📍</button>
    <button class="icon-btn" id="btnFav" title="Toggle favourite">☆</button>
    <button class="icon-btn" id="btnSearch" title="Search / Favourites">☰</button>
  </header>
  <main id="main">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Fetching weather…</div></div>
  </main>
</div>

<!-- Search / Favourites overlay -->
<div class="overlay" id="overlay">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search city or town…" autocomplete="off">
  </div>
  <div class="overlay-scroll">
    <div class="section-label" id="resultsLabel" style="display:none">Results</div>
    <ul class="search-results" id="searchResults"></ul>
    <div class="section-label" id="favsLabel">Favourites</div>
    <ul class="fav-list" id="favList"></ul>
    <div style="padding:16px 0; text-align:center;">
      <button class="icon-btn" id="closeOverlay" style="width:auto;padding:10px 24px;border-radius:var(--radius-sm);font-size:0.9rem;">Close</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  Drizzl Weather — Open-Meteo PWA
// ═══════════════════════════════════════════

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ── State ──
let state = {
  favourites: [],       // [{name, region, country, lat, lon}]
  activeLocation: null, // {name, region, country, lat, lon}
  weather: null,
};

const STALE_MS = 60 * 60 * 1000; // 1 hour
let lastFetchTime = 0;

// ── LocalStorage ──
function loadState() {
  try {
    const f = localStorage.getItem('drizzl_favs');
    const a = localStorage.getItem('drizzl_active');
    if (f) state.favourites = JSON.parse(f);
    if (a) state.activeLocation = JSON.parse(a);
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('drizzl_favs', JSON.stringify(state.favourites));
    if (state.activeLocation) localStorage.setItem('drizzl_active', JSON.stringify(state.activeLocation));
  } catch(e) {}
}

// ── Weather codes → description & icon ──
const WMO = {
  0:  ['Clear sky','☀️','☀️','🌙'],
  1:  ['Mainly clear','🌤️','🌤️','🌙'],
  2:  ['Partly cloudy','⛅','⛅','☁️'],
  3:  ['Overcast','☁️','☁️','☁️'],
  45: ['Foggy','🌫️','🌫️','🌫️'],
  48: ['Rime fog','🌫️','🌫️','🌫️'],
  51: ['Light drizzle','🌦️','🌦️','🌧️'],
  53: ['Drizzle','🌦️','🌦️','🌧️'],
  55: ['Heavy drizzle','🌧️','🌧️','🌧️'],
  56: ['Freezing drizzle','🌧️','🌧️','🌧️'],
  57: ['Heavy freezing drizzle','🌧️','🌧️','🌧️'],
  61: ['Light rain','🌦️','🌦️','🌧️'],
  63: ['Rain','🌧️','🌧️','🌧️'],
  65: ['Heavy rain','🌧️','🌧️','🌧️'],
  66: ['Freezing rain','🌧️','🌧️','🌧️'],
  67: ['Heavy freezing rain','🌧️','🌧️','🌧️'],
  71: ['Light snow','🌨️','🌨️','🌨️'],
  73: ['Snow','🌨️','🌨️','🌨️'],
  75: ['Heavy snow','❄️','❄️','❄️'],
  77: ['Snow grains','🌨️','🌨️','🌨️'],
  80: ['Light showers','🌦️','🌦️','🌧️'],
  81: ['Showers','🌧️','🌧️','🌧️'],
  82: ['Heavy showers','🌧️','🌧️','🌧️'],
  85: ['Light snow showers','🌨️','🌨️','🌨️'],
  86: ['Heavy snow showers','❄️','❄️','❄️'],
  95: ['Thunderstorm','⛈️','⛈️','⛈️'],
  96: ['Thunderstorm + hail','⛈️','⛈️','⛈️'],
  99: ['Thunderstorm + heavy hail','⛈️','⛈️','⛈️'],
};
function wmoDesc(code) { return (WMO[code] || WMO[0])[0]; }
// Override precipitation weather codes when PoP is 0%
function adjustCode(code, precip) { return (precip <= 0 && code >= 51) ? 3 : code; }
function wmoIcon(code, isNight) {
  const entry = WMO[code] || WMO[0];
  return isNight ? entry[3] : entry[1];
}
function wmoDailyIcon(code) { return (WMO[code] || WMO[0])[1]; }

// Return the most representative weather code for a given date string
// by finding the modal hourly code during is_day hours.
// Falls back to the supplied daily code if no matching hours are found.
// When fromIdx is provided (for "today"), only hours from that index onwards
// are considered and is_day filtering is skipped (we show what's left, not what was).
function representativeDailyCode(dateStr, fallbackCode, hourly, fromIdx) {
  const freq = {};
  const start = fromIdx != null ? fromIdx : 0;
  for (let i = start; i < hourly.time.length; i++) {
    if (!hourly.time[i].startsWith(dateStr)) continue;
    if (fromIdx == null && hourly.is_day[i] !== 1) continue;
    const code = hourly.weather_code[i];
    freq[code] = (freq[code] || 0) + 1;
  }
  const entries = Object.entries(freq);
  if (!entries.length) return fallbackCode;
  // Pick the code with the highest frequency; ties broken by lower (less severe) code
  entries.sort((a, b) => b[1] - a[1] || a[0] - b[0]);
  return Number(entries[0][0]);
}

// ── Sun / twilight calculations ──
function julianDay(date) {
  const y = date.getUTCFullYear(), m = date.getUTCMonth() + 1, d = date.getUTCDate();
  const h = date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600;
  const a = Math.floor((14 - m) / 12);
  const yy = y + 4800 - a;
  const mm = m + 12 * a - 3;
  return d + Math.floor((153*mm+2)/5) + 365*yy + Math.floor(yy/4) - Math.floor(yy/100) + Math.floor(yy/400) - 32045 + (h - 12)/24;
}

function sunTimes(date, lat, lon) {
  const rad = Math.PI / 180;
  // Normalize to noon UTC — the algorithm requires this as the starting point
  const noon = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0));
  const jd = julianDay(noon);
  const n = jd - 2451545.0 + 0.0008;
  const Js = n - lon / 360;
  const M = (357.5291 + 0.98560028 * Js) % 360;
  const C = 1.9148 * Math.sin(M*rad) + 0.02 * Math.sin(2*M*rad) + 0.0003 * Math.sin(3*M*rad);
  const lambda = (M + C + 180 + 102.9372) % 360;
  const Jt = 2451545.0 + Js + 0.0053 * Math.sin(M*rad) - 0.0069 * Math.sin(2*lambda*rad);
  const sinDec = Math.sin(lambda*rad) * Math.sin(23.4393*rad);
  const cosDec = Math.cos(Math.asin(sinDec));
  const decl = Math.asin(sinDec);

  function timeForAngle(angle) {
    const cosH = (Math.sin(angle*rad) - Math.sin(lat*rad)*sinDec) / (Math.cos(lat*rad)*cosDec);
    if (cosH < -1 || cosH > 1) return null; // never rises/sets
    const H = Math.acos(cosH) / rad;
    const Jrise = Jt - H / 360;
    const Jset  = Jt + H / 360;
    return { rise: jdToDate(Jrise), set: jdToDate(Jset) };
  }

  return {
    sun:       timeForAngle(-0.833),  // sunrise / sunset
    civil:     timeForAngle(-6),      // dawn / dusk (civil twilight)
    nautical:  timeForAngle(-12),     // nautical twilight
    astro:     timeForAngle(-18),     // astronomical twilight
  };
}

function jdToDate(jd) {
  const ms = (jd - 2440587.5) * 86400000;
  return new Date(ms);
}

// ── Moon phase ──
function moonPhase(date) {
  // Reference new moon: 2000-01-06 18:14 UTC
  const ref = new Date(Date.UTC(2000, 0, 6, 18, 14, 0));
  const diff = (date - ref) / (1000 * 60 * 60 * 24);
  const synodic = 29.53059;
  let phase = ((diff % synodic) + synodic) % synodic;
  const fraction = phase / synodic; // 0=new, 0.5=full
  const illumination = (1 - Math.cos(2 * Math.PI * fraction)) / 2;

  let name;
  if (fraction < 0.025 || fraction >= 0.975) name = 'New Moon';
  else if (fraction < 0.225) name = 'Waxing Crescent';
  else if (fraction < 0.275) name = 'First Quarter';
  else if (fraction < 0.475) name = 'Waxing Gibbous';
  else if (fraction < 0.525) name = 'Full Moon';
  else if (fraction < 0.725) name = 'Waning Gibbous';
  else if (fraction < 0.775) name = 'Last Quarter';
  else name = 'Waning Crescent';

  return { fraction, illumination, name };
}

// ── Moon position (simplified Meeus) ──
function moonAltitude(date, lat, lon) {
  const rad = Math.PI / 180;
  const d = (date.getTime() - Date.UTC(2000, 0, 1, 12)) / 86400000;

  // Moon mean elements (degrees)
  const L0 = (218.316 + 13.176396 * d) % 360;
  const M  = (134.963 + 13.064993 * d) % 360;
  const F  = (93.272  + 13.229350 * d) % 360;

  // Ecliptic longitude (5 largest perturbation terms)
  const eclLng = (L0 + 6.289 * Math.sin(M * rad)
                     - 1.274 * Math.sin((2 * L0 - M) * rad)
                     - 0.658 * Math.sin(2 * L0 * rad)
                     - 0.214 * Math.sin(2 * M * rad)) * rad;
  const eclLat = (5.128 * Math.sin(F * rad)) * rad;

  // Obliquity
  const eps = 23.4393 * rad;

  // Ecliptic → equatorial
  const sinLng = Math.sin(eclLng), cosLng = Math.cos(eclLng);
  const sinLat = Math.sin(eclLat), cosLat = Math.cos(eclLat);
  const ra  = Math.atan2(sinLng * Math.cos(eps) - Math.tan(eclLat) * Math.sin(eps), cosLng);
  const dec = Math.asin(sinLat * Math.cos(eps) + cosLat * Math.sin(eps) * sinLng);

  // Sidereal time → hour angle
  const gmst = ((280.16 + 360.9856235 * d) % 360) * rad;
  const ha   = gmst + lon * rad - ra;

  // Altitude
  return Math.asin(Math.sin(lat * rad) * Math.sin(dec)
                 + Math.cos(lat * rad) * Math.cos(dec) * Math.cos(ha)) / rad;
}

function getMoonTimes(date, lat, lon, tz) {
  // Scan 36 hours starting from midnight of the given date to find rise/set/transit
  // Returns { rise: Date|null, set: Date|null, transit: Date|null, transitAlt: number }
  const midnight = new Date(date);
  midnight.setHours(0, 0, 0, 0);

  // If we have a timezone, compute midnight in that timezone
  if (tz) {
    const localStr = midnight.toLocaleString('en-US', { timeZone: tz });
    const localMidnight = new Date(localStr);
    const offset = midnight.getTime() - localMidnight.getTime();
    midnight.setTime(midnight.getTime() + offset);
  }

  const step = 5; // minutes — 5min resolution, refine at crossings
  const totalMinutes = 36 * 60; // scan 36 hours
  let rise = null, set = null, transit = null;
  let maxAlt = -Infinity, maxAltTime = null;
  let prevAlt = moonAltitude(midnight, lat, lon);

  for (let m = step; m <= totalMinutes; m += step) {
    const t = new Date(midnight.getTime() + m * 60000);
    const alt = moonAltitude(t, lat, lon);

    if (alt > maxAlt) {
      maxAlt = alt;
      maxAltTime = t;
    }

    // Rising: altitude crosses from negative to positive
    if (prevAlt <= 0 && alt > 0 && !rise) {
      // Linear interpolation for more precise time
      const frac = -prevAlt / (alt - prevAlt);
      rise = new Date(t.getTime() - step * 60000 * (1 - frac));
    }

    // Setting: altitude crosses from positive to negative
    if (prevAlt > 0 && alt <= 0 && !set && rise) {
      const frac = prevAlt / (prevAlt - alt);
      set = new Date(t.getTime() - step * 60000 * (1 - frac));
    }

    prevAlt = alt;
  }

  // If we found a rise but no set within 36h, moon hasn't set yet
  // If we found neither, moon may be circumpolar or never rises

  return { rise, set, transit: maxAltTime, transitAlt: maxAlt };
}

// ── Wind direction ──
function windDir(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ── Format helpers ──
function fmt(n, d=0) { return n != null ? n.toFixed(d) : '—'; }
function fmtTime(date, tz) {
  if (!date) return '—';
  const opts = { hour: '2-digit', minute: '2-digit', hour12: false };
  if (tz) opts.timeZone = tz;
  return date.toLocaleTimeString([], opts);
}

// ── Atmosphere background ──
function updateAtmosphere(weatherCode, lat, lon) {
  const atmos = $('#atmosphere');
  const now = new Date();
  const times = sunTimes(now, lat, lon);

  // Determine time period
  let period = 'day';
  if (times.sun && times.civil) {
    const nowMs = now.getTime();
    const rise = times.sun.rise.getTime();
    const set = times.sun.set.getTime();
    const dawn = times.civil.rise.getTime();
    const dusk = times.civil.set.getTime();

    if (nowMs < dawn || nowMs > dusk) period = 'night';
    else if (nowMs < rise) period = 'dawn';
    else if (nowMs > set) period = 'dusk';
    else period = 'day';
  }

  // Override for weather
  let cls = `atmos-${period}`;
  if ([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(weatherCode)) cls = 'atmos-rain';
  else if ([71,73,75,77,85,86].includes(weatherCode)) cls = 'atmos-snow';
  else if (weatherCode === 3 && period === 'day') cls = 'atmos-overcast';

  atmos.className = cls;
  document.body.className = cls;
}

// ── Fetch weather from Open-Meteo ──
async function fetchWeather(lat, lon) {
  const params = new URLSearchParams({
    latitude: lat,
    longitude: lon,
    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,cloud_cover',
    hourly: 'temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_direction_10m,is_day',
    daily: 'weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max',
    timezone: 'auto',
    forecast_days: 10,
  });
  const resp = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

// ── Geocoding ──
async function searchLocation(query) {
  const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=en`);
  const data = await resp.json();
  return data.results || [];
}

// ── Geolocation ──
function getGeoLocation() {
  return new Promise((resolve, reject) => {
    try {
      if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        err => reject(err),
        { timeout: 10000 }
      );
    } catch(e) { reject(e); }
  });
}

// Reverse geocode via OpenStreetMap Nominatim (free, no key)
// Nominatim usage policy requires app identification.
// The browser sends Referer automatically when hosted; we also pass email.
// Change this to your own contact address if you fork this project.
const NOMINATIM_EMAIL = 'drizzl-weather-app@users.noreply.github.com';

async function reverseGeocode(lat, lon) {
  try {
    const resp = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=12&addressdetails=1&email=${encodeURIComponent(NOMINATIM_EMAIL)}`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await resp.json();
    const a = data.address || {};
    const name = a.city || a.town || a.village || a.hamlet || a.suburb || data.name || 'Unknown';
    const region = a.county || a.state || '';
    const country = a.country || '';
    return { name, region, country, lat, lon, isGeo: true };
  } catch(e) {
    return { name: 'My Location', region: '', country: '', lat, lon, isGeo: true };
  }
}

// ── Render ──
function render(weather, location) {
  state.weather = weather;
  const main = $('#main');
  const c = weather.current;
  const now = new Date();
  const isNight = !isDay(weather, now);

  updateAtmosphere(c.weather_code, location.lat, location.lon);
  updateFavBtn();

  // Shift 'now' so its local getters return the location's current date (not the browser's).
  // sunTimes() uses date.getFullYear()/.getMonth()/.getDate() internally, so this ensures
  // dawn/dusk are computed for the correct calendar day at the remote location.
  const _locShift = (weather.utc_offset_seconds * 1000) + (now.getTimezoneOffset() * 60000);
  const times = sunTimes(new Date(now.getTime() + _locShift), location.lat, location.lon);
  const moon = moonPhase(now);
  const mTimes = getMoonTimes(now, location.lat, location.lon, weather.timezone);

  // ── Current conditions ──
  const daily = weather.daily;
  let html = `<div class="fade-in">`;
  html += `<div class="current-location">${esc(location.name)}</div>`;
  if (location.region || location.country) {
    html += `<div class="current-region">${esc([location.region, location.country].filter(Boolean).join(', '))}</div>`;
  }
  {
    const locNow = new Date(now.getTime() + (weather.utc_offset_seconds * 1000) + (now.getTimezoneOffset() * 60000));
    const locTime = locNow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    const offsetSec = weather.utc_offset_seconds;
    const sign = offsetSec >= 0 ? '+' : '-';
    const absH = Math.floor(Math.abs(offsetSec) / 3600);
    const absM = Math.floor((Math.abs(offsetSec) % 3600) / 60);
    const utcLabel = absM === 0 ? `UTC${sign}${absH}` : `UTC${sign}${absH}:${String(absM).padStart(2,'0')}`;
    html += `<div class="current-localtime">Local time ${locTime} · ${utcLabel}</div>`;
  }
  html += `<div class="current-main">
    <div class="current-temp">${fmt(c.temperature_2m, 0)}<sup>°C</sup></div>
    <div class="current-icon">${wmoIcon(c.weather_code, isNight)}</div>
  </div>`;
  html += `<div class="current-desc">${wmoDesc(c.weather_code)}</div>`;
  html += `<div class="current-details">
    <span>🌡️ Feels ${fmt(c.apparent_temperature, 0)}°</span>
    <span>💧 ${fmt(c.relative_humidity_2m, 0)}%</span>
    <span>💨 ${fmt(c.wind_speed_10m, 0)} km/h ${windDir(c.wind_direction_10m)}</span>
    <span>🔽 ${fmt(c.surface_pressure, 0)} hPa</span>
    <span>☁️ ${fmt(c.cloud_cover, 0)}%</span>
    <span>☔ ${fmt(c.precipitation, 1)} mm</span>
    <span>☀️ UV ${fmt(daily.uv_index_max[0], 0)}</span>
  </div>`;

  // ── Hourly forecast helpers ──
  const hourlyTimes = weather.hourly.time;
  // Find current hour index
  const nowISO = now.toISOString().slice(0, 13);
  let startIdx = hourlyTimes.findIndex(t => t.startsWith(nowISO));
  if (startIdx < 0) startIdx = 0;

  // Find midnight boundaries
  // Open-Meteo hourly times are in location timezone, e.g. "2026-03-14T08:00"
  const todayDate = hourlyTimes[startIdx].slice(0, 10); // e.g. "2026-03-14"

  // Compute tomorrow's date string by finding the next distinct date in the data
  let tomorrowDate = null;
  for (let i = startIdx; i < hourlyTimes.length; i++) {
    const d = hourlyTimes[i].slice(0, 10);
    if (d !== todayDate) { tomorrowDate = d; break; }
  }

  const tomorrowMidnightIdx = tomorrowDate
    ? hourlyTimes.indexOf(tomorrowDate + 'T00:00')
    : -1;

  // Day after tomorrow
  let dayAfterDate = null;
  if (tomorrowMidnightIdx >= 0) {
    for (let i = tomorrowMidnightIdx; i < hourlyTimes.length; i++) {
      const d = hourlyTimes[i].slice(0, 10);
      if (d !== tomorrowDate) { dayAfterDate = d; break; }
    }
  }
  const dayAfterMidnightIdx = dayAfterDate
    ? hourlyTimes.indexOf(dayAfterDate + 'T00:00')
    : -1;

  function renderHourChips(fromIdx, toIdx, firstIsNow) {
    let chips = '';
    for (let i = fromIdx; i < toIdx && i < hourlyTimes.length; i++) {
      const t = new Date(hourlyTimes[i]);
      const hh = t.getHours();
      const label = (i === fromIdx && firstIsNow) ? 'Now' : `${String(hh).padStart(2,'0')}:00`;
      const precip = weather.hourly.precipitation_probability[i];
      const precipMm = weather.hourly.precipitation[i];
      const icon = wmoIcon(adjustCode(weather.hourly.weather_code[i], precip), weather.hourly.is_day[i] === 0);
      const temp = fmt(weather.hourly.temperature_2m[i], 0);
      const windSpd = fmt(weather.hourly.wind_speed_10m[i], 0);
      const windD = windDir(weather.hourly.wind_direction_10m[i]);
      const isNowCls = (i === fromIdx && firstIsNow) ? ' now' : '';
      const precipMmStr = precipMm < 0.05 ? '<0.1mm' : `${fmt(precipMm, 1)}mm`;
      const precipLabel = precip > 0
        ? `${fmt(precip, 0)}% · ${precipMmStr}`
        : `${fmt(precip, 0)}%`;
      chips += `<div class="hour-chip${isNowCls}">
        <span class="h-time">${label}</span>
        <span class="h-icon">${icon}</span>
        <span class="h-temp">${temp}°</span>
        <span class="h-precip">${precipLabel}</span>
        <span class="h-wind">💨${windSpd} ${windD}</span>
      </div>`;
    }
    return chips;
  }

  // ── Today's hourly forecast (now → midnight) ──
  const todayEndIdx = tomorrowMidnightIdx > startIdx ? tomorrowMidnightIdx : startIdx + 12;
  html += `<div class="card" style="margin-top:20px;">
    <div class="card-title">Today<span class="card-title-date">${new Date(hourlyTimes[startIdx].slice(0,10) + 'T12:00:00').toLocaleDateString([], {day:'numeric', month:'short'})}</span></div>
    <div class="hourly-scroll">${renderHourChips(startIdx, todayEndIdx, true)}</div>
  </div>`;

  // ── Tomorrow's hourly forecast (midnight → midnight) ──
  if (tomorrowMidnightIdx > 0) {
    const tomorrowEndIdx = dayAfterMidnightIdx > tomorrowMidnightIdx ? dayAfterMidnightIdx : tomorrowMidnightIdx + 24;
    html += `<div class="card">
      <div class="card-title">Tomorrow<span class="card-title-date">${new Date(tomorrowDate + 'T12:00:00').toLocaleDateString([], {day:'numeric', month:'short'})}</span></div>
      <div class="hourly-scroll">${renderHourChips(tomorrowMidnightIdx, tomorrowEndIdx, false)}</div>
    </div>`;
  }

  // ── Daily forecast ──
  const allMin = Math.min(...daily.temperature_2m_min);
  const allMax = Math.max(...daily.temperature_2m_max);
  const range = allMax - allMin || 1;

  html += `<div class="card"><div class="card-title">10-Day Forecast</div>`;
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (let i = 0; i < daily.time.length; i++) {
    const d = new Date(daily.time[i] + 'T12:00:00');
    const dayLabel = i === 0 ? 'Today' : dayNames[d.getDay()];
    const lo = daily.temperature_2m_min[i];
    const hi = daily.temperature_2m_max[i];
    const left = ((lo - allMin) / range) * 100;
    const width = ((hi - lo) / range) * 100;
    const precip = daily.precipitation_probability_max[i];
    const dWindSpd = fmt(daily.wind_speed_10m_max[i], 0);
    const dWindD = windDir(daily.wind_direction_10m_dominant[i]);
    html += `<div class="daily-row">
      <span class="daily-day">${dayLabel}<br><span class="daily-day-date">${new Date(daily.time[i] + 'T12:00:00').toLocaleDateString([], {day:'numeric', month:'short'})}</span></span>
      <span class="daily-icon">${i === 0
        ? wmoIcon(adjustCode(representativeDailyCode(daily.time[i], daily.weather_code[i], weather.hourly, startIdx), precip), isNight)
        : wmoDailyIcon(adjustCode(representativeDailyCode(daily.time[i], daily.weather_code[i], weather.hourly), precip))}</span>
      <span class="daily-precip">${fmt(precip, 0)}%</span>
      <span class="daily-wind">💨${dWindSpd} ${dWindD}</span>
      <div class="daily-bar-wrap">
        <span class="daily-lo">${fmt(lo,0)}°</span>
        <div class="daily-bar"><div class="daily-bar-fill" style="left:${left}%;width:${Math.max(width,4)}%"></div></div>
        <span class="daily-hi">${fmt(hi,0)}°</span>
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── Daylight Graph ──
  const tz = weather.timezone;
  const utcOffset = weather.utc_offset_seconds; // always present when timezone=auto

  // Open-Meteo returns sunrise/sunset as bare ISO strings (e.g. "2026-03-15T06:01") in the
  // location's local time, with no timezone designator.  new Date() would interpret those as
  // browser-local time, giving a result that's wrong for any browser not in the location's tz.
  // Appending the explicit UTC offset fixes the parse.
  function parseApiTime(str) {
    if (!str) return null;
    const sign = utcOffset >= 0 ? '+' : '-';
    const a    = Math.abs(utcOffset);
    const hh   = String(Math.floor(a / 3600)).padStart(2, '0');
    const mm   = String(Math.floor((a % 3600) / 60)).padStart(2, '0');
    return new Date(`${str}${sign}${hh}:${mm}`);
  }

  // Get actual Date objects for the key sun events
  const sunriseDate = daily.sunrise ? parseApiTime(daily.sunrise[0]) : (times.sun ? times.sun.rise : null);
  const sunsetDate  = daily.sunset  ? parseApiTime(daily.sunset[0])  : (times.sun ? times.sun.set  : null);
  const dawnDate = times.civil ? times.civil.rise : null;
  const duskDate = times.civil ? times.civil.set  : null;
  const solarNoonDate = sunriseDate && sunsetDate ? new Date((sunriseDate.getTime() + sunsetDate.getTime()) / 2) : null;

  // Format labels
  const apiSunrise = sunriseDate ? fmtTime(sunriseDate, tz) : '—';
  const apiSunset  = sunsetDate  ? fmtTime(sunsetDate, tz)  : '—';
  const dawnLabel  = dawnDate    ? fmtTime(dawnDate, tz)     : '—';
  const duskLabel  = duskDate    ? fmtTime(duskDate, tz)     : '—';
  const noonLabel  = solarNoonDate ? fmtTime(solarNoonDate, tz) : '—';

  const daylightDuration = sunriseDate && sunsetDate ? (() => {
    const ms = sunsetDate - sunriseDate;
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `${h}h ${m}m`;
  })() : '';

  html += `<div class="card">
    <div class="card-title">Sunrise & Sunset</div>
    ${renderDaylightArc(dawnDate, sunriseDate, sunsetDate, duskDate, now, apiSunrise, apiSunset, dawnLabel, noonLabel, duskLabel, tz)}
    ${daylightDuration ? `<div class="daylight-summary"><div>Daylight <span>${daylightDuration}</span></div></div>` : ''}
  </div>`;

  html += `<div class="card">
    <div class="card-title">Moonrise & Moonset</div>
    ${renderMoonArc(mTimes, now, moon, tz, location.lat, location.lon)}
    <div class="moon-row">
      ${renderMoonDisc(moon)}
      <div class="moon-info">
        <div class="moon-name">${moon.name}</div>
        <div class="moon-illum">${(moon.illumination * 100).toFixed(0)}% illuminated</div>
      </div>
    </div>
  </div>`;

  // ── Updated ──
  html += `<div class="updated">Updated ${now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: false})}</div>`;
  html += `</div>`;

  main.innerHTML = html;
}

function renderDaylightArc(dawn, sunrise, sunset, dusk, now, sunriseLabel, sunsetLabel, dawnLabel, noonLabel, duskLabel, tz) {
  if (!dawn || !sunrise || !sunset || !dusk) {
    return '<div style="text-align:center;color:var(--text-dim);padding:20px;">Sun data unavailable</div>';
  }

  const W = 400, H = 220;
  const margin = 16;
  const graphL = margin, graphR = W - margin, graphW = graphR - graphL;
  const topY = 46;       // pixel y for curve peak
  const bottomY = 155;   // pixel y for curve baseline (deepest night)
  const labelZone = 185;  // y for bottom labels

  const nowMs = now.getTime();

  // ── Cosine wave with 24h period, peak at solar noon ──
  const sunriseMs = sunrise.getTime();
  const sunsetMs = sunset.getTime();
  const dawnMs = dawn.getTime();
  const duskMs = dusk.getTime();
  const solarNoonMs = (sunriseMs + sunsetMs) / 2;

  // ── Time axis: 24h centered on solar noon ──
  // Centering on browser "now" breaks when the browser's calendar date differs
  // from the location's (e.g. UK browser at 17:44 UTC viewing Bangkok at 00:44
  // local): Open-Meteo returns the location's current day, so sunrise/sunset
  // can fall completely outside a ±12h window around the browser clock.
  // Centering on solar noon guarantees sunrise (~-6h) and sunset (~+6h) are
  // always symmetrically in view regardless of the viewer's timezone.
  const halfDay = 12 * 3600000;
  const tLeft  = solarNoonMs - halfDay;
  const tRight = solarNoonMs + halfDay;

  function tx(ms) { return graphL + ((ms - tLeft) / (tRight - tLeft)) * graphW; }
  const dayLength = 24 * 3600000;

  function curveHeight(ms) {
    // Cosine wave: 1 at solar noon, 0 at solar midnight, smooth throughout
    return (1 + Math.cos(2 * Math.PI * (ms - solarNoonMs) / dayLength)) / 2;
  }

  function curveY(ms) {
    return bottomY - curveHeight(ms) * (bottomY - topY);
  }

  // ── Horizon line: y-position where curve = sunrise = sunset ──
  const horizonY = curveY(sunriseMs);

  // ── Build smooth curve across full 24h ──
  const steps = 150;
  let curvePts = [];
  for (let i = 0; i <= steps; i++) {
    const ms = tLeft + (tRight - tLeft) * (i / steps);
    curvePts.push({ x: tx(ms), y: curveY(ms) });
  }
  const curvePath = curvePts.map((p, i) =>
    `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
  ).join(' ');

  // ── Daylight fill: area between curve and horizon, only above horizon ──
  let dayFillPts = [];
  const srX = Math.max(graphL, tx(sunriseMs));
  const ssX = Math.min(graphR, tx(sunsetMs));
  if (ssX > srX) {
    for (let i = 0; i <= 80; i++) {
      const ms = sunriseMs + (sunsetMs - sunriseMs) * (i / 80);
      const x = tx(ms);
      if (x >= graphL && x <= graphR) {
        dayFillPts.push(`${dayFillPts.length === 0 ? 'M' : 'L'}${x.toFixed(1)},${curveY(ms).toFixed(1)}`);
      }
    }
    dayFillPts.push(`L${ssX.toFixed(1)},${horizonY.toFixed(1)}`);
    dayFillPts.push(`L${srX.toFixed(1)},${horizonY.toFixed(1)} Z`);
  }

  // ── Centre marker: sun or crescent moon ──
  const centreX = Math.max(graphL + 14, Math.min(graphR - 14, tx(nowMs)));
  const centreY = curveY(nowMs);
  const isAboveHorizon = centreY < horizonY;

  let marker = '';
  if (isAboveHorizon) {
    marker = `
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="14" fill="url(#sunGlow)" />
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="9" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" />
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="4" fill="#fef3c7" />`;
  } else {
    marker = `
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="7" fill="#e2e8f0" />
      <circle cx="${(centreX + 3).toFixed(1)}" cy="${(centreY - 2).toFixed(1)}" r="5.5" fill="rgba(0,0,0,0.85)" />`;
  }

  // ── Label positions ──
  const xSunrise = tx(sunriseMs), xSunset = tx(sunsetMs);
  const xDawn = tx(dawnMs), xNoon = tx(solarNoonMs), xDusk = tx(duskMs);
  function clampX(x) { return Math.max(graphL + 20, Math.min(graphR - 20, x)); }
  const inView = (ms) => ms >= tLeft && ms <= tRight;

  return `<div class="daylight-graph"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sunGlow">
        <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="dayFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.15"/>
      </linearGradient>
    </defs>

    ${inView(sunriseMs) ? `
      <text x="${clampX(xSunrise).toFixed(1)}" y="18" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="17" font-family="var(--font-body)">Sunrise</text>
      <text x="${clampX(xSunrise).toFixed(1)}" y="40" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-weight="600" font-family="var(--font-display)">${sunriseLabel}</text>
    ` : ''}

    ${inView(sunsetMs) ? `
      <text x="${clampX(xSunset).toFixed(1)}" y="18" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="17" font-family="var(--font-body)">Sunset</text>
      <text x="${clampX(xSunset).toFixed(1)}" y="40" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-weight="600" font-family="var(--font-display)">${sunsetLabel}</text>
    ` : ''}

    ${dayFillPts.length > 0 ? `<path d="${dayFillPts.join(' ')}" fill="url(#dayFill)" />` : ''}

    <line x1="${graphL}" y1="${horizonY.toFixed(1)}" x2="${graphR}" y2="${horizonY.toFixed(1)}" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="6,4" />

    <path d="${curvePath}" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" />

    ${dayFillPts.length > 0 ? `<path d="${curvePts.filter(p => p.y < horizonY - 0.5).map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}" fill="none" stroke="rgba(96,165,250,0.9)" stroke-width="3.5" />` : ''}

    ${marker}

    ${inView(dawnMs) ? `
      <text x="${clampX(xDawn).toFixed(1)}" y="${labelZone - 8}" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="16" font-family="var(--font-body)">Dawn</text>
      <text x="${clampX(xDawn).toFixed(1)}" y="${labelZone + 12}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-weight="500" font-family="var(--font-display)">${dawnLabel}</text>
    ` : ''}

    ${inView(solarNoonMs) ? `
      <text x="${clampX(xNoon).toFixed(1)}" y="${labelZone - 8}" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="16" font-family="var(--font-body)">Solar noon</text>
      <text x="${clampX(xNoon).toFixed(1)}" y="${labelZone + 12}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-weight="500" font-family="var(--font-display)">${noonLabel}</text>
    ` : ''}

    ${inView(duskMs) ? `
      <text x="${clampX(xDusk).toFixed(1)}" y="${labelZone - 8}" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="16" font-family="var(--font-body)">Dusk</text>
      <text x="${clampX(xDusk).toFixed(1)}" y="${labelZone + 12}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-weight="500" font-family="var(--font-display)">${duskLabel}</text>
    ` : ''}
  </svg></div>`;
}


function renderMoonDisc(moon) {
  // SVG moon phase: lit circle with shadow overlay using elliptical terminator
  // fraction: 0 = new, 0.25 = first quarter, 0.5 = full, 0.75 = last quarter
  const f = moon.fraction;
  const size = 40;
  const r = size / 2;
  const cx = r, cy = r;

  const litColor = '#e8e8d0';
  const darkColor = '#2a2a3e';

  if (f < 0.01 || f > 0.99) {
    return `<div style="width:${size}px;height:${size}px;flex-shrink:0;">
      <svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="${darkColor}"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
      </svg></div>`;
  }
  if (f > 0.49 && f < 0.51) {
    return `<div style="width:${size}px;height:${size}px;flex-shrink:0;">
      <svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="${litColor}"/>
      </svg></div>`;
  }

  // Terminator x-radius: 0 at quarter phases, r at new/full
  let tRx;
  if (f <= 0.5) {
    tRx = Math.abs(1 - f * 4) * r;
  } else {
    tRx = Math.abs(1 - (f - 0.5) * 4) * r;
  }

  // Shadow path: drawn on top of a lit circle
  // Waxing (0→0.5): shadow on LEFT side
  // Waning (0.5→1): shadow on RIGHT side
  let shadowPath;

  if (f < 0.25) {
    // Waxing crescent: large shadow on left (more than half)
    // Left semicircle + terminator bulging right
    shadowPath = `M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} A${tRx.toFixed(1)},${r} 0 0,0 ${cx},${cy-r}`;
  } else if (f < 0.5) {
    // Waxing gibbous: small shadow crescent on left
    // Left semicircle + terminator curving left (thin crescent)
    shadowPath = `M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} A${tRx.toFixed(1)},${r} 0 0,1 ${cx},${cy-r}`;
  } else if (f < 0.75) {
    // Waning gibbous: small shadow crescent on right
    // Right semicircle + terminator curving right (thin crescent)
    shadowPath = `M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} A${tRx.toFixed(1)},${r} 0 0,0 ${cx},${cy-r}`;
  } else {
    // Waning crescent: large shadow on right (more than half)
    // Right semicircle + terminator bulging left
    shadowPath = `M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} A${tRx.toFixed(1)},${r} 0 0,1 ${cx},${cy-r}`;
  }

  return `<div style="width:${size}px;height:${size}px;flex-shrink:0;">
    <svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${litColor}"/>
      <path d="${shadowPath}" fill="${darkColor}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    </svg></div>`;
}

function renderMoonArc(moonTimes, now, moon, tz, lat, lon) {
  const { rise, set, transit, transitAlt } = moonTimes;

  // Need at least transit to render something meaningful
  if (!transit) {
    return '<div style="text-align:center;color:var(--text-dim);padding:20px;">Moon data unavailable</div>';
  }

  const W = 400, H = 220;
  const margin = 16;
  const graphL = margin, graphR = W - margin, graphW = graphR - graphL;
  const topY = 46;
  const bottomY = 155;
  const labelZone = 185;

  const nowMs = now.getTime();
  const transitMs = transit.getTime();

  // 24h window centered on transit
  const halfDay = 12 * 3600000;
  const tLeft  = transitMs - halfDay;
  const tRight = transitMs + halfDay;

  function tx(ms) { return graphL + ((ms - tLeft) / (tRight - tLeft)) * graphW; }

  // Compute altitude at regular intervals for the curve
  // We use actual computed altitudes, not a pure cosine — the moon's motion is irregular
  const steps = 150;
  let altitudes = [];
  let maxAlt = -Infinity, minAlt = Infinity;
  for (let i = 0; i <= steps; i++) {
    const ms = tLeft + (tRight - tLeft) * (i / steps);
    const alt = moonAltitude(new Date(ms), lat, lon);
    altitudes.push({ ms, alt });
    if (alt > maxAlt) maxAlt = alt;
    if (alt < minAlt) minAlt = alt;
  }

  // Scale altitudes to pixel coordinates
  // Map maxAlt → topY, minAlt → bottomY
  const altRange = maxAlt - minAlt || 1;
  function altToY(alt) {
    return bottomY - ((alt - minAlt) / altRange) * (bottomY - topY);
  }

  // Horizon line: altitude = 0
  const horizonY = altToY(0);

  // Build the curve path
  let curvePts = altitudes.map(a => ({ x: tx(a.ms), y: altToY(a.alt) }));
  const curvePath = curvePts.map((p, i) =>
    `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
  ).join(' ');

  // Fill above horizon
  let abovePts = [];
  for (const a of altitudes) {
    if (a.alt > 0) {
      const x = tx(a.ms), y = altToY(a.alt);
      abovePts.push({ x, y, ms: a.ms });
    }
  }
  let fillPath = '';
  if (abovePts.length > 1) {
    const first = abovePts[0], last = abovePts[abovePts.length - 1];
    fillPath = abovePts.map((p, i) =>
      `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
    ).join(' ');
    fillPath += ` L${last.x.toFixed(1)},${horizonY.toFixed(1)} L${first.x.toFixed(1)},${horizonY.toFixed(1)} Z`;
  }

  // Above-horizon curve highlight
  const aboveCurvePath = curvePts.filter(p => p.y < horizonY - 0.5).map((p, i) =>
    `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`
  ).join(' ');

  // Moon marker position — use computed altitude for now
  const nowAlt = moonAltitude(now, lat, lon);
  const centreX = Math.max(graphL + 14, Math.min(graphR - 14, tx(nowMs)));
  const centreY = altToY(nowAlt);
  const isAboveHorizon = nowAlt > 0;

  // Small inline moon disc as marker (18px diameter)
  const mr = 9;
  const f = moon.fraction;
  const litC = '#e8e8d0', darkC = isAboveHorizon ? '#2a2a3e' : '#1a1a2e';
  let moonMarker = '';
  if (f < 0.01 || f > 0.99) {
    moonMarker = `<circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="${mr}" fill="${darkC}" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>`;
  } else if (f > 0.49 && f < 0.51) {
    moonMarker = `
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="${(mr+5)}" fill="rgba(232,232,208,0.15)"/>
      <circle cx="${centreX.toFixed(1)}" cy="${centreY.toFixed(1)}" r="${mr}" fill="${litC}"/>`;
  } else {
    let tRx;
    if (f <= 0.5) tRx = Math.abs(1 - f * 4) * mr;
    else tRx = Math.abs(1 - (f - 0.5) * 4) * mr;
    const mcx = centreX.toFixed(1), mcy = centreY.toFixed(1);
    let shadowPath;
    if (f < 0.25) shadowPath = `M${mcx},${mcy-mr} A${mr},${mr} 0 0,0 ${mcx},${+mcy+mr} A${tRx.toFixed(1)},${mr} 0 0,0 ${mcx},${mcy-mr}`;
    else if (f < 0.5) shadowPath = `M${mcx},${mcy-mr} A${mr},${mr} 0 0,0 ${mcx},${+mcy+mr} A${tRx.toFixed(1)},${mr} 0 0,1 ${mcx},${mcy-mr}`;
    else if (f < 0.75) shadowPath = `M${mcx},${mcy-mr} A${mr},${mr} 0 0,1 ${mcx},${+mcy+mr} A${tRx.toFixed(1)},${mr} 0 0,0 ${mcx},${mcy-mr}`;
    else shadowPath = `M${mcx},${mcy-mr} A${mr},${mr} 0 0,1 ${mcx},${+mcy+mr} A${tRx.toFixed(1)},${mr} 0 0,1 ${mcx},${mcy-mr}`;

    moonMarker = `
      ${isAboveHorizon ? `<circle cx="${mcx}" cy="${mcy}" r="${(mr+5)}" fill="rgba(232,232,208,0.12)"/>` : ''}
      <circle cx="${mcx}" cy="${mcy}" r="${mr}" fill="${litC}"/>
      <path d="${shadowPath}" fill="${darkC}"/>
      <circle cx="${mcx}" cy="${mcy}" r="${mr}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>`;
  }

  // Labels
  const riseMs = rise ? rise.getTime() : null;
  const setMs  = set  ? set.getTime()  : null;
  const inView = (ms) => ms !== null && ms >= tLeft && ms <= tRight;
  function clampX(x) { return Math.max(graphL + 20, Math.min(graphR - 20, x)); }

  const riseLabel = rise ? fmtTime(rise, tz) : null;
  const setLabel  = set  ? fmtTime(set, tz)  : null;
  const transitLabel = fmtTime(transit, tz);

  const xRise    = riseMs ? tx(riseMs) : 0;
  const xSet     = setMs  ? tx(setMs)  : 0;
  const xTransit = tx(transitMs);

  return `<div class="moon-graph"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="moonGlow">
        <stop offset="0%" stop-color="#e8e8d0" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#e8e8d0" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="moonFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.1"/>
      </linearGradient>
    </defs>

    ${inView(riseMs) ? `
      <text x="${clampX(xRise).toFixed(1)}" y="18" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="17" font-family="var(--font-body)">Moonrise</text>
      <text x="${clampX(xRise).toFixed(1)}" y="40" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-weight="600" font-family="var(--font-display)">${riseLabel}</text>
    ` : ''}

    ${inView(setMs) ? `
      <text x="${clampX(xSet).toFixed(1)}" y="18" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="17" font-family="var(--font-body)">Moonset</text>
      <text x="${clampX(xSet).toFixed(1)}" y="40" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-weight="600" font-family="var(--font-display)">${setLabel}</text>
    ` : ''}

    ${fillPath ? `<path d="${fillPath}" fill="url(#moonFill)" />` : ''}

    ${horizonY >= topY && horizonY <= bottomY ? `<line x1="${graphL}" y1="${horizonY.toFixed(1)}" x2="${graphR}" y2="${horizonY.toFixed(1)}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="6,4" />` : ''}

    <path d="${curvePath}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" />
    ${aboveCurvePath ? `<path d="${aboveCurvePath}" fill="none" stroke="rgba(148,163,184,0.85)" stroke-width="3.5" />` : ''}

    ${moonMarker}

    ${inView(transitMs) ? `
      <text x="${clampX(xTransit).toFixed(1)}" y="${labelZone - 8}" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="16" font-family="var(--font-body)">Transit</text>
      <text x="${clampX(xTransit).toFixed(1)}" y="${labelZone + 12}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-weight="500" font-family="var(--font-display)">${transitLabel}</text>
    ` : ''}
  </svg></div>`;
}

function isDay(weather, now) {
  const hourlyTimes = weather.hourly.time;
  const nowISO = now.toISOString().slice(0, 13);
  const idx = hourlyTimes.findIndex(t => t.startsWith(nowISO));
  if (idx >= 0) return weather.hourly.is_day[idx] === 1;
  return now.getHours() > 6 && now.getHours() < 20;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Favourites ──
function isFavourite(loc) {
  if (!loc) return false;
  return state.favourites.some(f => f.lat === loc.lat && f.lon === loc.lon);
}

function toggleFavourite() {
  if (!state.activeLocation) return;
  const loc = state.activeLocation;
  if (isFavourite(loc)) {
    state.favourites = state.favourites.filter(f => !(f.lat === loc.lat && f.lon === loc.lon));
  } else {
    state.favourites.push({ ...loc });
  }
  saveState();
  updateFavBtn();
}

function updateFavBtn() {
  const btn = $('#btnFav');
  btn.textContent = isFavourite(state.activeLocation) ? '★' : '☆';
  btn.classList.toggle('active', isFavourite(state.activeLocation));
}

// ── Overlay (search & favourites) ──
let _overlayGeoPos = null; // cached device position for result sorting

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function openOverlay() {
  $('#overlay').classList.add('open');
  $('#searchInput').value = '';
  $('#searchResults').innerHTML = '';
  $('#resultsLabel').style.display = 'none';
  $('#favsLabel').style.display = 'block';
  renderFavList();
  setTimeout(() => $('#searchInput').focus(), 100);
  // Kick off a background geo fix for proximity sorting; accept a 1-min cached position
  // so this typically resolves instantly without a fresh GPS acquisition.
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => { _overlayGeoPos = { lat: pos.coords.latitude, lon: pos.coords.longitude }; },
      () => {}, // permission denied or unavailable — sort falls back to API order
      { maximumAge: 60000, timeout: 5000, enableHighAccuracy: false }
    );
  }
}
function closeOverlay() {
  $('#overlay').classList.remove('open');
}

function renderFavList() {
  const list = $('#favList');
  if (state.favourites.length === 0) {
    list.innerHTML = '<li style="color:var(--text-dim);cursor:default;">No favourites yet — search for a location and tap ☆</li>';
    return;
  }
  list.innerHTML = state.favourites.map((f, i) => `
    <li>
      <span style="font-size:1.2rem;">📌</span>
      <span class="fav-name" data-idx="${i}">${esc(f.name)}${f.region ? ', ' + esc(f.region) : ''}</span>
      <span class="fav-remove" data-idx="${i}" title="Remove">✕</span>
    </li>
  `).join('');

  list.querySelectorAll('.fav-name').forEach(el => {
    el.addEventListener('click', () => {
      const f = state.favourites[+el.dataset.idx];
      selectLocation(f);
      closeOverlay();
    });
  });
  list.querySelectorAll('.fav-remove').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.favourites.splice(+el.dataset.idx, 1);
      saveState();
      renderFavList();
      updateFavBtn();
    });
  });
}

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

let _searchSeq = 0;

async function doSearch() {
  const q = $('#searchInput').value.trim();
  const list = $('#searchResults');
  const label = $('#resultsLabel');
  if (q.length < 2) {
    label.style.display = 'none';
    list.innerHTML = '';
    $('#favsLabel').style.display = 'block';
    return;
  }
  const seq = ++_searchSeq;
  label.style.display = 'block';
  $('#favsLabel').style.display = 'none';
  list.innerHTML = '<li style="color:var(--text-dim);cursor:default;">Searching…</li>';
  const results = await searchLocation(q);
  if (seq !== _searchSeq) return; // A newer request is in flight — discard this result
  if (_overlayGeoPos) {
    results.sort((a, b) =>
      haversineKm(_overlayGeoPos.lat, _overlayGeoPos.lon, a.latitude, a.longitude) -
      haversineKm(_overlayGeoPos.lat, _overlayGeoPos.lon, b.latitude, b.longitude)
    );
  }
  if (results.length === 0) {
    list.innerHTML = '<li style="color:var(--text-dim);cursor:default;">No results found</li>';
    return;
  }
  list.innerHTML = results.map((r, i) => `
    <li data-idx="${i}">
      <span style="font-size:1.1rem;">📍</span>
      <span>${esc(r.name)}, ${esc(r.admin1 || '')} ${esc(r.country || '')}</span>
    </li>
  `).join('');
  list.querySelectorAll('li').forEach(el => {
    el.addEventListener('click', () => {
      const r = results[+el.dataset.idx];
      const loc = { name: r.name, region: r.admin1 || '', country: r.country || '', lat: r.latitude, lon: r.longitude };
      selectLocation(loc);
      closeOverlay();
    });
  });
}

async function selectLocation(loc) {
  // Explicitly chosen locations are fixed — don't re-geolocate on next launch
  state.activeLocation = { ...loc, isGeo: false };
  saveState();
  updateFavBtn();
  await loadWeather();
}

async function loadWeather() {
  const loc = state.activeLocation;
  if (!loc) return;
  const main = $('#main');
  main.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Fetching weather…</div></div>';
  try {
    const weather = await fetchWeather(loc.lat, loc.lon);
    lastFetchTime = Date.now();
    render(weather, loc);
  } catch (err) {
    main.innerHTML = `<div class="error-msg">
      <p>Failed to fetch weather data.</p>
      <p style="font-size:0.8rem;margin-top:8px;">${esc(err.message)}</p>
      <button onclick="loadWeather()">Retry</button>
    </div>`;
  }
}

// ── Geolocation button ──
async function useGeolocation() {
  const main = $('#main');
  main.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Getting your location…</div></div>';
  try {
    const pos = await getGeoLocation();
    const loc = await reverseGeocode(pos.lat, pos.lon);
    state.activeLocation = loc;
    saveState();
    await loadWeather();
  } catch (err) {
    main.innerHTML = `<div class="error-msg">
      <p>Could not get your location.</p>
      <p style="font-size:0.8rem;margin-top:8px;">${esc(err.message)}</p>
      <button onclick="openOverlay()">Search instead</button>
    </div>`;
  }
}

// ── Event bindings ──
$('#btnSearch').addEventListener('click', openOverlay);
$('#closeOverlay').addEventListener('click', closeOverlay);
$('#btnFav').addEventListener('click', toggleFavourite);
$('#btnGeo').addEventListener('click', useGeolocation);
$('#searchInput').addEventListener('input', debounce(doSearch, 300));
$('#searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// Close overlay on escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

// ── Init ──
loadState();
if (state.activeLocation && !state.activeLocation.isGeo) {
  // Saved location was manually searched — use it directly
  loadWeather();
} else {
  // Either no saved location, or last location was geo-derived — re-request
  (async () => {
    const main = $('#main');
    main.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Getting your location…</div></div>';
    try {
      const pos = await getGeoLocation();
      const loc = await reverseGeocode(pos.lat, pos.lon);
      state.activeLocation = loc;
      saveState();
      await loadWeather();
    } catch(e) {
      // Geolocation failed — use saved geo location if we have one, otherwise London
      if (!state.activeLocation) {
        state.activeLocation = { name: 'London', region: 'England', country: 'United Kingdom', lat: 51.5074, lon: -0.1278 };
        saveState();
      }
      loadWeather();
    }
  })();
}

// ── Auto-refresh ──
async function refreshWeather() {
  const loc = state.activeLocation;
  if (!loc) return;
  try {
    const weather = await fetchWeather(loc.lat, loc.lon);
    lastFetchTime = Date.now();
    render(weather, loc);
  } catch (e) {
    // Silent fail — stale data beats an error screen
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && Date.now() - lastFetchTime > STALE_MS) {
    refreshWeather();
  }
});

setInterval(() => {
  if (document.visibilityState === 'visible' && Date.now() - lastFetchTime > STALE_MS) {
    refreshWeather();
  }
}, STALE_MS);

// ── Service Worker ──
try {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
} catch(e) {}
</script>
</body>
</html>
